name: Market Data

on:
  schedule:
    # 00:20 UTC = 08:20 Asia/Taipei, Monday-Friday
    - cron: "20 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python fetch_market_data.py

      - name: Commit market data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add market_data.json market_data.md
          git commit -m "Update public market data" || echo "No changes to commit"
          git push
