name: Stock Report

on:
  schedule:
    - cron: "20 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python investment.py

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add report.md
          git commit -m "Update daily investment report" || echo "No changes to commit"
          git push
